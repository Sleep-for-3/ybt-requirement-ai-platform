services:
  postgres:
    image: postgres:16
    container_name: ybt-postgres
    profiles: ["production"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ybt-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/ybt.db}
      CORS_ORIGINS: http://localhost:3000
      STORAGE_DIR: /app/storage
      AUTH_MODE: ${AUTH_MODE:-optional}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      TASK_QUEUE_PROVIDER: ${TASK_QUEUE_PROVIDER:-inline}
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
      - backend_data:/app/data

  redis:
    image: redis:7-alpine
    profiles: ["production"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis_data:/data"]

  worker:
    build:
      context: ./backend
    profiles: ["production"]
    command: ["python", "-m", "celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: production
      AUTH_MODE: required
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      TASK_QUEUE_PROVIDER: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://object-storage:9000}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
    depends_on: [redis, postgres]

  object-storage:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["production"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: minio server /data
    volumes: ["object_storage_data:/data"]

  frontend:
    build:
      context: ./frontend
    container_name: ybt-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    profiles: ["milvus"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes: ["etcd_data:/etcd"]

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["milvus"]
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_ROOT_PASSWORD}
    command: minio server /minio_data
    volumes: ["milvus_minio_data:/minio_data"]

  milvus:
    image: milvusdb/milvus:v2.5.4
    profiles: ["milvus"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_ROOT_PASSWORD}
    ports: ["19530:19530"]
    depends_on: ["etcd", "milvus-minio"]
    volumes: ["milvus_data:/var/lib/milvus"]

volumes:
  postgres_data:
  backend_storage:
  backend_data:
  redis_data:
  object_storage_data:
  etcd_data:
  milvus_minio_data:
  milvus_data:

# Optional future services:
# - Milvus: semantic vector database. Knowhere is Milvus' internal vector execution engine;
#   this platform should integrate through Milvus APIs, not Knowhere directly.
# - MinIO: object storage for uploaded documents when local container storage is not enough.
