name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ybt-requirement-ai-platform/backend
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      STORAGE_DIR: /tmp/ybt-storage
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      VECTOR_STORE_PROVIDER: mock
      APP_SECRET_KEY: ci-only-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ybt-requirement-ai-platform/backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q
      - run: python -m compileall -q app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ybt-requirement-ai-platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ybt-requirement-ai-platform/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
