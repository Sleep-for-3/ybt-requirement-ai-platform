name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ybt-requirement-ai-platform/backend
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      STORAGE_DIR: /tmp/ybt-storage
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      VECTOR_STORE_PROVIDER: mock
      APP_SECRET_KEY: ci-only-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ybt-requirement-ai-platform/backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - name: Verify Alembic upgrade and downgrade
        run: |
          rm -f ci_test.db
          rm -rf /tmp/ybt-storage
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head
          rm -f ci_upgrade_from_main.db
          DATABASE_URL=sqlite:///./ci_upgrade_from_main.db python -m alembic upgrade 202607150009
          DATABASE_URL=sqlite:///./ci_upgrade_from_main.db python -m alembic upgrade head
      - name: Run backend tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests/test_deliverables.py
          deliverable_status=$?
          if [ "$deliverable_status" -ne 0 ]; then
            exit "$deliverable_status"
          fi
          python -m pytest -q tests/test_sql_lineage.py
          lineage_status=$?
          if [ "$lineage_status" -ne 0 ]; then
            exit "$lineage_status"
          fi
          python -m pytest -q 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error title=Backend pytest::$line"
            done < <(tail -n 80 pytest.log)
          fi
          exit "$status"
      - run: python -m compileall -q app

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ybt-requirement-ai-platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ybt-requirement-ai-platform/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
