name: Full Smoke Test

on:
  push:
    branches:
      - codex/uat-productization-deployment-v1
  workflow_dispatch:
  schedule:
    - cron: "17 19 * * 0"

permissions:
  contents: read

concurrency:
  group: full-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ENVIRONMENT: production
      DEBUG: "false"
      AUTH_MODE: required
      APP_SECRET_KEY: full-smoke-app-secret-2026-sanitized
      JWT_SECRET_KEY: full-smoke-jwt-secret-2026-sanitized-at-least-32-characters
      DATABASE_URL: sqlite:////tmp/ybt-full-smoke.db
      STORAGE_PROVIDER: local
      STORAGE_DIR: /tmp/ybt-full-smoke-storage
      UAT_LOCAL_PACK_DIR: /tmp/ybt-uat-local-packs
      TASK_QUEUE_PROVIDER: inline
      VECTOR_STORE_PROVIDER: mock
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      LINEAGE_GIT_ENABLED: "false"
      CORS_ORIGINS: http://127.0.0.1:3000
      HEALTH_DETAILS_PUBLIC: "false"
      SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/artifacts
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ybt-requirement-ai-platform/backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ybt-requirement-ai-platform/frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r ybt-requirement-ai-platform/backend/requirements.txt

      - name: Run backend regression tests
        working-directory: ybt-requirement-ai-platform/backend
        env:
          ENVIRONMENT: test
          AUTH_MODE: optional
        run: python -m pytest -q

      - name: Verify migrations from an empty database
        working-directory: ybt-requirement-ai-platform/backend
        run: |
          rm -f /tmp/ybt-full-smoke.db
          rm -rf /tmp/ybt-full-smoke-storage /tmp/ybt-uat-local-packs
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

      - name: Build frontend
        working-directory: ybt-requirement-ai-platform/frontend
        run: |
          npm ci
          npm run build

      - name: Generate deterministic public UAT material pack
        working-directory: ybt-requirement-ai-platform
        run: python scripts/generate_demo_uat_pack.py --output "$RUNNER_TEMP/generated-demo-uat-pack"

      - name: Run authenticated end-to-end smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SMOKE_ARTIFACT_DIR"
          (
            cd ybt-requirement-ai-platform/backend
            python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 \
              > "$SMOKE_ARTIFACT_DIR/backend.log" 2>&1
          ) &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8000/api/health/live >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Backend did not become live in time"
              exit 1
            fi
            sleep 1
          done
          python ybt-requirement-ai-platform/scripts/smoke_test.py \
            | tee "$SMOKE_ARTIFACT_DIR/smoke-result.json"
          curl --fail --silent http://127.0.0.1:8000/api/health/ready \
            | tee "$SMOKE_ARTIFACT_DIR/health-ready.json"

      - name: Run CI-sized performance baseline
        run: |
          python ybt-requirement-ai-platform/scripts/performance_baseline.py --small \
            --output "$SMOKE_ARTIFACT_DIR/performance-baseline.json" \
            --excel-output "$SMOKE_ARTIFACT_DIR/performance-baseline.xlsx"

      - name: Verify artifact safety
        shell: bash
        run: |
          if find "$SMOKE_ARTIFACT_DIR" -type f \
            \( -name '*.db' -o -name '.env' -o -iname '*secret*' -o -iname '*token*' \) \
            | grep -q .; then
            echo "Unsafe artifact filename detected"
            exit 1
          fi
          test -s "$SMOKE_ARTIFACT_DIR/uat-report.xlsx"
          test -s "$SMOKE_ARTIFACT_DIR/uat-evidence.zip"
          test -s "$SMOKE_ARTIFACT_DIR/formal-deliverable.xlsx"
          test -s "$SMOKE_ARTIFACT_DIR/performance-baseline.json"

      - name: Upload sanitized smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-smoke-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
